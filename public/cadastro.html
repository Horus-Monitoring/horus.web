<!DOCTYPE html>

<head>

    <meta charset="UTF-8">

    <link rel="stylesheet" type="text/css" href="style/cadstro.css">

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Atkinson+Hyperlegible+Mono:ital,wght@0,200..800;1,200..800&family=Jura:wght@300..700&family=Pixelify+Sans:wght@400..700&display=swap"
        rel="stylesheet">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Atkinson+Hyperlegible+Mono:ital,wght@0,200..800;1,200..800&family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&family=Jura:wght@300..700&family=Pixelify+Sans:wght@400..700&display=swap"
        rel="stylesheet">

</head>

<div class="esconder"></div>

<header>
    <div class="section_logo">
        <img src="assets/icon/logo.png" alt="Logo de avião">
        <p>Horus Monitoring</p>
    </div>
    <div class="section_href">
        <a href="home.html">Home</a>
        <a href="#">Login</a>
        <a href="cadastro.html">Cadastro</a>
    </div>
</header>

<body>
    <div class="container">
        <div class="boxCadastro">

            <h2>Cadastro</h2>

            <div class="formulario">
                <p class="TokenEmpresa">Token da Empresa</p>
                <input id="token_input" type="text">
                <!--   <img src="assets/imgs/login/user.png" alt="" class="user">-->
            </div>

            <div class="formulario">
                <p class="nome">Nome</p>
                <input id="nome_input" type="text">

            </div>

            <div class="formulario">
                <p class="cpf">CPF</p>
                <input id="cpf_input" type="number">

            </div>

            <div class="formulario">
                <p class="email">Email</p>
                <input id="email_input" type="text">

            </div>

            <div class="formulario">
                <p class="senha">Senha</p>
                <input id="senha_input" type="password">

            </div>

            <div class="formulario">
                <p class="confirmarSenha">Confirmar senha</p>
                <input id="confirmar_senha_input" type="password">

            </div>

            <div class="botao">
                <button onclick="cadastrar()">Cadastrar</button>
            </div>

            <div class="ou">
                <div class="barraE"></div>
                <h5>OU</h5>
                <div class="barraD"></div>
            </div>

            <div class="temLogin">
                <span>Ja tem um login?</span>
                <a href="login.html" class="efetuarLogin">Clique aqui</a>
            </div>


        </div>

    </div>


</body>

<script>
      let listaEmpresasCadastradas = [];

  function cadastrar() {
    // aguardar();

    //Recupere o valor da nova input pelo nome do id
    // Agora vá para o método fetch logo abaixo
    var nomeVar = nome_input.value;
    var emailVar = email_input.value;
    var senhaVar = senha_input.value;
    var confirmacaoSenhaVar = confirmar_senha_input.value;
    var codigoVar = token_input.value;
    var idEmpresaVincular

    // Verificando se há algum campo em branco
    if (
      nomeVar == "" ||
      emailVar == "" ||
      senhaVar == "" ||
      confirmacaoSenhaVar == "" ||
      codigoVar == ""
    ) {
      alert("Preencha todos os campos!");
return false;
    } 

    // Verificando se o código de ativação é de alguma empresa cadastrada
    for (let i = 0; i < listaEmpresasCadastradas.length; i++) {
      if (listaEmpresasCadastradas[i].codigo_ativacao == codigoVar) {
        idEmpresaVincular = listaEmpresasCadastradas[i].id
        console.log("Código de ativação válido.");
        break;
      } else {
        alert("Código da empresa inválido!");
return false;
      }
    }

    // Enviando o valor da nova input
    fetch("/usuario/cadastrar", {
      method: "POST",
      headers: {
        "Content-Type": "application/json",
      },
      body: JSON.stringify({
        // crie um atributo que recebe o valor recuperado aqui
        // Agora vá para o arquivo routes/usuario.js
        nomeServer: nomeVar,
        emailServer: emailVar,
        senhaServer: senhaVar,
        idEmpresaVincularServer: idEmpresaVincular
      }),
    })
      .then(function (resposta) {
        console.log("resposta: ", resposta);

        if (resposta.ok) {
          alert("Cadastro realizado com sucesso!");
          
          setTimeout(() => {
            window.location = "login.html";
          }, "2000");

          
          
        } else {
          throw "Houve um erro ao tentar realizar o cadastro!";
        }
      })
      .catch(function (resposta) {
        console.log(`#ERRO: ${resposta}`);
       
      });

    return false;
  }

  // Listando empresas cadastradas 
  function listar() {
    fetch("/empresas/listar", {
      method: "GET",
    })
      .then(function (resposta) {
        resposta.json().then((empresas) => {
          empresas.forEach((empresa) => {
            listaEmpresasCadastradas.push(empresa);

            console.log("listaEmpresasCadastradas")
            console.log(listaEmpresasCadastradas[0].codigo_ativacao)
          });
        });
      })
      .catch(function (resposta) {
        console.log(`#ERRO: ${resposta}`);
      });
  }

  
  

</script>
