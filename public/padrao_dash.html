    //Modal para o menu sanduíche

    const btnHamburguer = document.getElementById("hamburguer");
    const lateral = document.getElementById("lateral");
    const overlay = document.getElementById("overlay");

    function abrirMenu() {
        lateral.classList.add("ativo");
        overlay.classList.add("ativo");
    }

    function fecharMenu() {
        lateral.classList.remove("ativo");
        overlay.classList.remove("ativo");
    }

    if (btnHamburguer) {
        btnHamburguer.addEventListener("click", function (e) {
            e.stopPropagation();
            
            if (lateral.classList.contains("ativo")) {
                fecharMenu();
            } else {
                abrirMenu();
            }
        });
    }

    overlay.addEventListener("click", fecharMenu);

    document.addEventListener("click", function (e) {
        if (
            lateral.classList.contains("ativo") &&
            !lateral.contains(e.target) &&
            !btnHamburguer.contains(e.target)
        ) {
            fecharMenu();
        }
    });

    

</script>
